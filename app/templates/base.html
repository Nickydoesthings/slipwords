<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Slipwords{% endblock %} — Chinese–English Dictionary</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="site-header">
    <a href="/" class="site-logo">slipwords</a>
    <form class="search-form" action="/search" method="get" role="search">
      <input class="search-input" type="text" name="q" placeholder="Search in Chinese, pinyin, or English…" value="{{ request.query_params.get('q', '') }}" aria-label="Search">
      <button class="search-btn" type="submit">Search</button>
    </form>
  </header>

  <main class="page-content">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    Dictionary data from <a href="https://cc-cedict.org">CC-CEDICT</a> (CC BY-SA 4.0).
  </footer>
</body>
</html>
